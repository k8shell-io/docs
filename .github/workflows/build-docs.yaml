# workflow to build proxy image in the k8shell repository.

name: Build proxy image and chart
description: Build proxy image and chart and push them to the registry 

on:
  push:
    branches:
      - 'main'  

concurrency:
  # cancel the same workflow if it is running already
  group: docs-image-workflow
  cancel-in-progress: true

jobs:
  docs-image:
    runs-on: k8shell-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Build Python package
        run: |
          # Install dependencies
          python -m pip install --upgrade pip
          pip install sphinx-build sphinx myst_parser sphinx_copybutton furo directive
          rm -fr _build
          make html

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.HARBOR_USER }}
          password: ${{ env.HARBOR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: "docker/docs"
          tags: ${{ env.REGISTRY }}/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG }}
          push: true

      - name: Build and push chart
        run: |
          export VERSION=$(make version 2>/dev/null)
          sed -i "s/^\([[:space:]]*\)tag:.*/\1tag: \"${VERSION}\"/" helm/k8shell-proxy/values.yaml
          export BUILD_SUFFIX=$(echo ${VERSION} | grep -o "dev.*")
          if [ -n "$BUILD_SUFFIX" ]; then
            sed -i "s/^version: \([0-9.]*\)$/version: \1-$BUILD_SUFFIX/" helm/k8shell-proxy/Chart.yaml
          fi          
          echo "Building chart version $VERSION"
          make package
          echo "Logging in to ${{ env.REGISTRY }}"
          helm registry login ${{ env.REGISTRY }} --username "${{ env.HARBOR_USER }}" \
            --password "${{ env.HARBOR_PASSWORD }}"
          echo "Pushing chart to ${{ env.REGISTRY }}"
          helm push dist/$(ls dist | grep tgz) oci://${{ env.REGISTRY }}/charts
